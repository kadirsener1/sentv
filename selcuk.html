<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Stream Player</title>
    <style>
        body {
	                    position: absolute;
            top: 10%;

            background-color: #000;

            font-family: Arial, sans-serif;

            height: 100vh;
        }


        h2 {
            text-align: center;
            color: #fff;
        }

        .player-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background-color: rgba(0, 0, 0, 0.9);
        }

        .player-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%; /* Yükseklik %40 olarak ayarlandı */
            border: none;
        }
    </style>
</head>
<body>

    <ul id="streamList"></ul>

    <div class="player-container" id="playerContainer">
        <iframe id="videoFrame" src="" allowfullscreen></iframe>
    </div>

    <script>
        const kanalurl = {
            1: "selcukbeinsports1",
            2: "selcukbeinsports2",
            3: "selcukbeinsports3",
            4: "selcukbeinsports4",
            5: "selcukbeinsports5",
            6: "selcukbeinsportsmax1",
            7: "selcukbeinsportsmax2",
            8: "selcukssport",
            9: "selcukssport2",
            10: "102",
            11: "103",
            13: "606",
            14: "607",
            15: "608",
            16: "selcuktabiispor1",
            17: "selcuktabiispor2",
            18: "selcuktabiispor3",
            19: "selcuktabiispor4",
            20: "selcuktabiispor5",
            21: "2888",
            22: "112",
            23: "132",
            24: "142",
            25: "4011",
            26: "2888",
            27: "112",
            28: "132",
            29: "142",
            30: "4011",
            
        };

        const streamNames = {
            1: "BEİN SPORTS 1",
            2: "BEİN SPORTS 2",
            3: "BEİN SPORTS 3",
            4: "BEİN SPORTS 4",
            5: "BEİN SPORTS 4",
            6: "BEİN SPORTS  MAX 1",
            7: "BEİN SPORTS  MAX 2",
            8: "S SPORT 1",
            9: "S SPORT 2",
            10: "SPOR SMART 1",
            11: "SPOR SMART 2",
            13: "TİVİBU SPOR 1",
            14: "TİVİBU SPOR 2",
            15: "TİVİBU SPOR 3",
            16: "tabii 1",
            17: "tabii 2",
            18: "tabii 3",
            19: "tabii 4",
            20: "tabii 5",
            21: "TRT 1",
            22: "NBA TV",
            23: "EURO SPORT 1",
            24: "EURO SPORT 2",
            25: "EXXEN TV",
            26: "TRT 1",
            27: "NBA TV",
            28: "EURO SPORT 1",
            29: "EURO SPORT 2",
            30: "EXXEN TV",
        };

        function initializeStreams() {
            const streamListElement = document.getElementById('streamList');
            streamListElement.innerHTML = "";

            for (const key in kanalurl) {
                const streamId = kanalurl[key];
                const streamName = streamNames[key];

                const listItem = document.createElement('li');
                listItem.textContent = streamName;

                listItem.onclick = function () {
                    const videoUrl = `https://main.uxsyplayerd22c8f9c2ba8.click/index.php?id=${streamId}`;
                    openPlayer(videoUrl);
                };

                streamListElement.appendChild(listItem);
            }
        }

        function openPlayer(url) {
            const iframe = document.getElementById('videoFrame');
            iframe.src = url;

            const playerContainer = document.getElementById('playerContainer');
            const streamList = document.getElementById('streamList');

            // Listeyi gizle
            streamList.style.display = 'none';
            document.querySelector('h2').style.display = 'none';

            playerContainer.style.display = 'block';

            // Player dışına tıklanma ile kapama
            playerContainer.onclick = function (event) {
                if (event.target === playerContainer) {
                    closePlayer();
                }
            };

            // Geri tuşu ile kapatma
            window.onkeydown = function (event) {
                if (event.key === 'Backspace' || event.key === 'Escape') {
                    closePlayer();
                }
            };
        }

        function closePlayer() {
            const playerContainer = document.getElementById('playerContainer');
            const iframe = document.getElementById('videoFrame');
            const streamList = document.getElementById('streamList');

            // Listeyi geri getir
            streamList.style.display = 'block';
            document.querySelector('h2').style.display = 'block';

            playerContainer.style.display = 'none';
            iframe.src = '';
        }

        initializeStreams();
    </script>
</body>
</html>
