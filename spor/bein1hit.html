<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEN TİVİ</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.2/dist/plyr.css" />
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  overflow: hidden;
}

/* FULLSCREEN VIDEO */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

/* LOADING */
.loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #00b3ff;
  font-size: 24px;
  font-family: sans-serif;
}
</style>
</head>

<body>

<div id="loading" class="loading">SEN TİVİ YÜKLENİYOR...</div>

<video id="video" autoplay muted playsinline></video>

<script>
const video = document.getElementById("video");
const source = "https://api.hitnova.net/s/bm1/mono.m3u8";

/* HLS */
if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(source);
    hls.attachMedia(video);
} else {
    video.src = source;
}

/* PLYR (kontroller kapalı) */
const player = new Plyr(video, {
    controls: [],
    autoplay: true,
    muted: true
});

/* AUTOPLAY ZORLAMA */
video.muted = true;
video.play().catch(() => {});

/* LOADING KAPAT */
video.addEventListener("playing", () => {
    document.getElementById("loading").style.display = "none";
});
</script>

</body>
